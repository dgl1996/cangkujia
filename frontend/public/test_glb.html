<!DOCTYPE html>
<html>
<head>
    <title>GLB Test</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #info { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            color: white; 
            font-family: monospace; 
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="info">Loading...</div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100000);

        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 1);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 网格地面
        const gridHelper = new THREE.GridHelper(10000, 50, 0x888888, 0xcccccc);
        scene.add(gridHelper);

        // 加载模型
        const loader = new GLTFLoader();
        const modelUrl = '/assets/models/shelf-beam-heavy-3level.glb';
        
        loader.load(modelUrl, (gltf) => {
            document.getElementById('info').textContent = 'Model loaded successfully!';
            
            const model = gltf.scene;
            
            // 遍历并打印信息
            let meshCount = 0;
            model.traverse((child) => {
                if (child.isMesh) {
                    meshCount++;
                    console.log(`Mesh ${meshCount}:`, child.name);
                    console.log('  Geometry:', child.geometry.type);
                    console.log('  Has colors:', !!child.geometry.attributes.color);
                    console.log('  Material:', child.material ? child.material.type : 'none');
                    
                    // 使用顶点颜色
                    if (child.geometry.attributes.color) {
                        child.material = new THREE.MeshBasicMaterial({ vertexColors: true });
                    } else {
                        child.material = new THREE.MeshBasicMaterial({ color: 0x888888 });
                    }
                }
            });
            
            document.getElementById('info').textContent += ` (${meshCount} meshes)`;
            
            // 计算边界
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            console.log('Model size:', size.x, size.y, size.z);
            console.log('Model center:', center.x, center.y, center.z);
            console.log('Box min:', box.min.x, box.min.y, box.min.z);
            console.log('Box max:', box.max.x, box.max.y, box.max.z);
            
            // 调整模型位置
            model.position.x = -center.x;
            model.position.y = -box.min.y;
            model.position.z = -center.z;
            
            scene.add(model);
            
            // 调整相机
            const maxDim = Math.max(size.x, size.y, size.z);
            const distance = maxDim * 2;
            camera.position.set(distance, distance * 0.8, distance);
            camera.lookAt(0, size.y / 2, 0);
            controls.target.set(0, size.y / 2, 0);
            controls.update();
            
            console.log('Camera position:', camera.position.x, camera.position.y, camera.position.z);
            
        }, (progress) => {
            const percent = Math.round(progress.loaded / progress.total * 100);
            console.log('Loading:', percent + '%');
            document.getElementById('info').textContent = `Loading: ${percent}%`;
        }, (error) => {
            document.getElementById('info').textContent = 'Error: ' + error.message;
            console.error('Error loading model:', error);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
